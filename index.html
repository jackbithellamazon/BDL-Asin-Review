<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lead Analyzer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fa;
      --bg-tertiary: #f0f2f5;
      --text-primary: #1a1a1a;
      --text-secondary: #666666;
      --text-tertiary: #999999;
      --border-color: #e0e0e0;
      --blue: #2563eb;
      --blue-dark: #1d4ed8;
      --purple: #7c3aed;
      --pink: #ec4899;
      --cyan: #06b6d4;
      --green: #10b981;
      --yellow: #f59e0b;
      --red: #ef4444;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1a1a1a;
        --bg-secondary: #2d2d2d;
        --bg-tertiary: #404040;
        --text-primary: #ffffff;
        --text-secondary: #b0b0b0;
        --text-tertiary: #808080;
        --border-color: #404040;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s ease;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      }
    }

    .container {
      background: var(--bg-primary);
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      max-width: 700px;
      width: 100%;
      padding: 40px;
      transition: background 0.3s ease;
    }

    .header {
      margin-bottom: 40px;
      text-align: center;
    }

    .header h1 {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .header p {
      font-size: 16px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .form-section {
      margin-bottom: 40px;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-group:last-child {
      margin-bottom: 0;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .input-group input {
      width: 100%;
      padding: 14px 18px;
      font-size: 16px;
      border: 2px solid var(--border-color);
      border-radius: 12px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      transition: all 0.3s ease;
      font-family: inherit;
    }

    .input-group input:focus {
      outline: none;
      border-color: #2563eb;
      background-color: var(--bg-primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }

    .btn {
      width: 100%;
      padding: 16px 32px;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      color: white;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 28px;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(37, 99, 235, 0.4);
    }

    .btn:active {
      transform: translateY(-1px);
    }

    .results {
      display: none;
      animation: slideIn 0.4s ease;
    }

    .results.show {
      display: block;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 36px;
    }

    .metric-card {
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      border: 2px solid transparent;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--card-color-1, #2563eb) 0%, var(--card-color-2, #7c3aed) 100%);
    }

    .metric-card.spm {
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.1) 0%, rgba(37, 99, 235, 0.05) 100%);
      border-color: rgba(37, 99, 235, 0.2);
      --card-color-1: #2563eb;
      --card-color-2: #1d4ed8;
    }

    .metric-card.profit {
      background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%);
      border-color: rgba(16, 185, 129, 0.2);
      --card-color-1: #10b981;
      --card-color-2: #059669;
    }

    .metric-card.roi {
      background: linear-gradient(135deg, rgba(244, 63, 94, 0.1) 0%, rgba(244, 63, 94, 0.05) 100%);
      border-color: rgba(244, 63, 94, 0.2);
      --card-color-1: #f43f5e;
      --card-color-2: #e11d48;
    }

    .metric-card.tier {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.1) 0%, rgba(168, 85, 247, 0.05) 100%);
      border-color: rgba(168, 85, 247, 0.2);
      --card-color-1: #a855f7;
      --card-color-2: #9333ea;
    }

    .metric-card:hover {
      border-color: var(--card-color-1, #2563eb);
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
    }

    .metric-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .metric-value {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-primary);
    }

    .score-box {
      background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-tertiary) 100%);
      border: 2px solid var(--border-color);
      border-radius: 16px;
      padding: 40px 28px;
      text-align: center;
      margin-bottom: 24px;
      transition: all 0.3s ease;
    }

    .score-box:hover {
      border-color: #2563eb;
      box-shadow: 0 20px 40px rgba(37, 99, 235, 0.15);
    }

    .score-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 16px;
    }

    .score-number {
      font-size: 72px;
      font-weight: 900;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      line-height: 1;
    }

    .score-bar {
      width: 100%;
      height: 8px;
      background: var(--bg-tertiary);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 24px;
      border: 1px solid var(--border-color);
    }

    .score-fill {
      height: 100%;
      background: linear-gradient(90deg, #2563eb 0%, #7c3aed 100%);
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      border-radius: 4px;
    }

    .score-note {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.7;
      margin-top: 20px;
      font-weight: 500;
    }

    .tier-badge {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .tier-high {
      background: linear-gradient(135deg, #10b981 0%, #059669 100%);
      color: white;
      box-shadow: 0 8px 16px rgba(16, 185, 129, 0.3);
    }

    .tier-mid {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white;
      box-shadow: 0 8px 16px rgba(245, 158, 11, 0.3);
    }

    .tier-low {
      background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      color: white;
      box-shadow: 0 8px 16px rgba(239, 68, 68, 0.3);
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px;
      }

      .header h1 {
        font-size: 28px;
      }

      .metrics-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .score-number {
        font-size: 56px;
      }

      .btn {
        padding: 14px 24px;
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Lead Analyzer</h1>
      <p>Your sourcing lead scoring system</p>
    </div>

    <div class="form-section">
      <div class="input-group">
        <label for="spm">Sales per month (SPM)</label>
        <input type="number" id="spm" placeholder="e.g., 300" />
      </div>

      <div class="input-group">
        <label for="cost">Cost price (£)</label>
        <input type="number" id="cost" step="0.01" placeholder="e.g., 5.00" />
      </div>

      <div class="input-group">
        <label for="profit">Profit per unit (£)</label>
        <input type="number" id="profit" step="0.01" placeholder="e.g., 10.50" />
      </div>

      <div class="input-group">
        <label for="roi">ROI (%)</label>
        <input type="number" id="roi" step="0.1" placeholder="e.g., 25" />
      </div>

      <button class="btn" onclick="analyze()">Analyze Lead</button>
    </div>

    <div class="results" id="results">
      <div class="metrics-grid">
        <div class="metric-card spm">
          <div class="metric-label">SPM</div>
          <div class="metric-value" id="spm-display">0</div>
        </div>
        <div class="metric-card profit">
          <div class="metric-label">Profit/unit</div>
          <div class="metric-value" id="profit-display">£0</div>
        </div>
        <div class="metric-card roi">
          <div class="metric-label">ROI</div>
          <div class="metric-value" id="roi-display">0%</div>
        </div>
        <div class="metric-card tier">
          <div class="metric-label">Tier</div>
          <div class="metric-value" id="tier-display">—</div>
        </div>
      </div>

      <div class="score-box">
        <div class="score-label">Lead Score</div>
        <div class="tier-badge" id="tier-badge"></div>
        <div class="score-number" id="score-value">0</div>
        <div class="score-bar">
          <div class="score-fill" id="score-fill" style="width: 0%"></div>
        </div>
        <div class="score-note" id="score-note"></div>
      </div>
    </div>
  </div>

  <script>
    function analyze() {
      const spm = parseFloat(document.getElementById('spm').value) || 0;
      const cost = parseFloat(document.getElementById('cost').value) || 0;
      const profit = parseFloat(document.getElementById('profit').value) || 0;
      const roi = parseFloat(document.getElementById('roi').value) || 0;

      if (!spm || !profit) {
        alert('Please fill in SPM and Profit per unit');
        return;
      }

      document.getElementById('spm-display').textContent = Math.round(spm).toLocaleString();
      document.getElementById('profit-display').textContent = '£' + profit.toFixed(2);
      document.getElementById('roi-display').textContent = Math.round(roi) + '%';

      let priceTier = '';
      let tierClass = '';
      if (profit >= 9) {
        priceTier = 'High profit';
        tierClass = 'tier-high';
      } else if (profit >= 3) {
        priceTier = 'Mid profit';
        tierClass = 'tier-mid';
      } else {
        priceTier = 'Low profit';
        tierClass = 'tier-low';
      }

      let score = 0;
      let note = '';

      if (spm < 10) {
        score = 1;
        note = 'Below minimum volume.';
      } else if (spm >= 300) {
        if (profit >= 9) {
          score = 10;
          note = 'Absolute banger! Buy as many as possible.';
        } else if (profit >= 3) {
          score = 9;
          note = 'Rare find. Fast SPM + mid profit. Buy as many as possible.';
        } else {
          score = 7;
          note = 'Fast SPM but low profit. Still solid.';
        }
      } else if (spm >= 100) {
        if (profit >= 9) {
          score = 9;
          note = 'Rare find. Strong volume + high profit. Buy as many as possible.';
        } else if (profit >= 3) {
          score = 8;
          note = 'Strong buy. Good volume + mid profit.';
        } else {
          score = 6;
          note = 'Decent volume but low profit.';
        }
      } else if (spm >= 50) {
        if (profit >= 9) {
          score = 8;
          note = 'Good profit + decent volume. Strong buy.';
        } else if (profit >= 3) {
          score = 7;
          note = 'Bread & butter mid-ticket. Solid buy.';
        } else {
          score = 5;
          note = 'Borderline. Only if graphs look good.';
        }
      } else if (spm >= 30) {
        if (profit >= 9) {
          score = 8;
          note = 'High profit + decent volume. Buy 7-15 units.';
        } else if (profit >= 3) {
          score = 6;
          note = 'Will buy. Aim for 7-15 units depending on competition.';
        } else {
          score = 3;
          note = 'Low priority. Pass.';
        }
      } else if (spm >= 10) {
        if (profit >= 9) {
          score = 7;
          note = 'High profit! Borderline. Only if graphs look good.';
        } else if (profit >= 3) {
          score = 5;
          note = 'Borderline. Only if graphs look good.';
        } else {
          score = 2;
          note = 'Low priority. Pass.';
        }
      }

      if (roi < 10 && score > 3) {
        score = Math.max(score - 2, 3);
        note += ' (ROI below 10% — docked 2 points)';
      } else if (roi < 10) {
        score = 1;
        note = 'ROI below 10%. Pass.';
      }

      document.getElementById('tier-display').textContent = priceTier;
      document.getElementById('tier-badge').textContent = priceTier;
      document.getElementById('tier-badge').className = 'tier-badge ' + tierClass;
      document.getElementById('score-value').textContent = score.toFixed(1);
      document.getElementById('score-fill').style.width = (score / 10) * 100 + '%';
      document.getElementById('score-note').textContent = note;

      document.getElementById('results').classList.add('show');
    }

    document.getElementById('roi').addEventListener('keypress', e => {
      if (e.key === 'Enter') analyze();
    });
  </script>
</body>
</html>
